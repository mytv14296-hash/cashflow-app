<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow+</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>

<h1>💰 CashFlow+</h1>

</header>

<div class="container">

<div class="card saldo">

<h2>Saldo Saat Ini</h2>

<h1 id="saldo">Rp0</h1>

</div>

<div class="summary">

<div class="income">

<h3>Pemasukan</h3>

<p id="income">Rp0</p>

</div>

<div class="expense">

<h3>Pengeluaran</h3>

<p id="expense">Rp0</p>

</div>

</div>

<div class="card">

<h2>Tambah Transaksi</h2>

<form id="form">

<select id="jenis">

<option value="Masuk">💚 Pemasukan</option>

<option value="Keluar">❤️ Pengeluaran</option>

</select>

<input
type="text"
id="kategori"
placeholder="Kategori">

<input
type="number"
id="nominal"
placeholder="Nominal">

<input
type="text"
id="catatan"
placeholder="Catatan">

<button type="submit">

SIMPAN

</button>

</form>

</div>

<div class="card">

<h2>Statistik</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Riwayat</h2>

<div id="history">

Belum ada transaksi.

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
